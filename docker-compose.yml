version: "3.8"

services:
  # 1. PostgreSQL Veritabanı
  db:
    image: postgres:15-alpine
    container_name: proje_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Python FastAPI ML Servisi
  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: proje_ml
    ports:
      - "8000:8000"

  # 3. .NET 9 Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proje_backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};
      - MLServiceUrl=http://ml:8000
      - Gemini__ApiKey=${GEMINI_API_KEY}
    depends_on:
      # Sadece db konteynerinin başlamasını değil,
      # "sağlıklı" (healthcheck'ten geçmiş) olmasını bekle
      db:
        condition: service_healthy
      ml:
        condition: service_started

  # 4. React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proje_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
